name: Build Nexus Vision APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python 3.10 ───────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 3. System dependencies ───────────────────────────────────────────
      - name: Install system packages
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git zip unzip wget \
            openjdk-17-jdk \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            python3-dev build-essential \
            libltdl-dev ccache

      # ── 4. Force Java 17 as default ──────────────────────────────────────
      - name: Set Java 17 as default
        run: |
          sudo update-java-alternatives --set java-1.17.0-openjdk-amd64
          java -version
          javac -version
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      # ── 5. Python packages ───────────────────────────────────────────────
      - name: Install Python build tools
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "Cython==0.29.37"
          pip install buildozer

      # ── 6. Cache buildozer (~1 GB) ────────────────────────────────────────
      - name: Cache buildozer directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-master-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      # ── 7. Accept Android SDK licenses ───────────────────────────────────
      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          mkdir -p ~/.buildozer/android/platform
          echo "sdk.dir=$HOME/.buildozer/android/platform/android-sdk" > local.properties

      # ── 8. Build APK ──────────────────────────────────────────────────────
      - name: Build debug APK
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          unset CC CXX 2>/dev/null || true
          # NOTE: do NOT use set -o pipefail here.
          # `yes` exits with SIGPIPE (141) when buildozer closes stdin,
          # which would mark a SUCCESSFUL build as failed.
          # Use PIPESTATUS[1] to get buildozer's own exit code instead.
          yes 2>/dev/null | buildozer -v android debug 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[1]}

          if [ "${BUILD_EXIT}" != "0" ]; then
            echo ""
            echo "========================================="
            echo "         BUILD FAILED — ERROR LOG        "
            echo "========================================="
            echo "--- LAST 200 LINES ---"
            tail -200 build.log
            echo ""
            echo "--- P4A CRASH LOGS ---"
            find .buildozer -name "*.log" 2>/dev/null | while read f; do
              echo "=== $f (last 30 lines) ==="; tail -30 "$f"
            done
            exit 1
          fi

      # ── 9. Upload APK ────────────────────────────────────────────────────
      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nexus-vision-debug-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30

      # ── 10. Upload full build log (always) ───────────────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore
          retention-days: 7
